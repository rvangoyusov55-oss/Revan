<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>MedCloud | Giriş</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 350px; text-align: center; }
        h1 { color: #0056b3; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-login { background: #0056b3; color: white; }
        .btn-reg { background: transparent; color: #0056b3; border: 1px solid #0056b3; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>MedCloud</h1>
        <input type="text" id="fin" placeholder="FIN Kod (Məs: ADMIN01)">
        <input type="password" id="pass" placeholder="Şifrə">
        <button class="btn btn-login" onclick="login()">Portala Daxil Ol</button>
        <button class="btn btn-reg" onclick="window.location.href='/register'">Yeni Pasiyent Qeydiyyatı</button>
    </div>

    <script>
        async function login() {
            const fin = document.getElementById('fin').value;
            const pass = document.getElementById('pass').value;
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ fin, pass })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('user', JSON.stringify(data.user));
                // Əgər rolu admindirsə adminə, deyilsə portala göndər
                window.location.href = data.user.role === 'admin' ? '/admin' : '/portal';
            } else {
                alert("Məlumatlar yanlışdır!");
            }
        }
    </script>
</body>
</html>
